apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vaultwarden
  namespace: vaultwarden
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    lbipam.cilium.io/ips: 10.10.2.53
spec:
  ingressClassName: cilium
  tls:
    - hosts:
        - passwd.cosmin-lab.com
      secretName: vaultwarden-tls
  rules:
    - host: passwd.cosmin-lab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vaultwarden
                port:
                  number: 80
