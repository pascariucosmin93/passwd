name: passwd-production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: passwd-production
  cancel-in-progress: false

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Generate CI secret manifest
        run: cp overlays/prod/secret.example.yaml overlays/prod/secret.yaml

      - name: Validate Docker build
        run: docker build -t passwd-ci:${GITHUB_SHA} .

      - name: Validate Kubernetes manifests
        run: kubectl kustomize overlays/prod > /tmp/passwd-rendered.yaml

      - name: Ensure rendered output exists
        run: test -s /tmp/passwd-rendered.yaml

  build-and-push:
    if: github.actor != 'github-actions[bot]'
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.meta.outputs.image_repository }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Derive image metadata
        id: meta
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          owner="$(echo "${REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image_repository=ghcr.io/${owner}/passwd" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        env:
          IMAGE_REPOSITORY: ${{ steps.meta.outputs.image_repository }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag "${IMAGE_REPOSITORY}:${IMAGE_TAG}" \
            --tag "${IMAGE_REPOSITORY}:latest" \
            --push \
            .

  update-gitops-tag:
    if: github.actor != 'github-actions[bot]'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update image tag in overlay
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          sed -i "s|newTag: .*|newTag: ${IMAGE_TAG}|" overlays/prod/kustomization.yaml
          grep -n "newTag:" overlays/prod/kustomization.yaml

      - name: Commit updated tag
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          if git diff --quiet -- overlays/prod/kustomization.yaml; then
            echo "No GitOps changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add overlays/prod/kustomization.yaml
          git commit -m "chore(release): deploy ${IMAGE_TAG} [skip ci]"
          git push
