apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: passwd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pascariucosmin93/passwd.git
    targetRevision: main
    path: overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: vaultwarden
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

